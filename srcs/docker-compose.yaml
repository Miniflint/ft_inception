services:
  nginx:
    build:
      context: "./nginx/"
      dockerfile: "Dockerfile"
    container_name: "nginx"
    image: "custom_nginx"
    restart: "always"
    ports:
      - "8080:80"
    volumes:
      - wordpress-data:/mnt/wordpress
  
  php-wp:
    build:
      context: "./php_wp/"
      dockerfile: "Dockerfile"
    container_name: "php-wp"
    image: "custom_phpwp"
    restart: "always"
    volumes:
      - wordpress-data:/mnt/wordpress
  
  mariaDB:
    build:
      context: "./mariaDB/"
      dockerfile: "Dockerfile"
    container_name: "mariadb"
    image: "custom_maria"
    restart: "always"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  wordpress-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PATH_WPHP}
  db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PATH_MARIA}
